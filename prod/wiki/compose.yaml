services:
  otterwiki:
    image: redimp/otterwiki:2.20.6
    restart: unless-stopped
    volumes:
      - /mnt/nas/prod/wiki:/app-data
    environment:
      PUID: 65534
      PGID: 65534
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.wiki.rule=Host(`wiki.jonasandersen.no`)
        - traefik.http.services.wiki.loadbalancer.server.port=80
        - traefik.http.routers.wiki.entrypoints=http,https,http-external