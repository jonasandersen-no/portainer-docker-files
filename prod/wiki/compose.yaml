services:
  otterwiki:
    image: redimp/otterwiki:2.20.6-slim
    restart: unless-stopped
    volumes:
      - /mnt/nas/prod/wiki:/app-data
    user: 65534:65534
    networks:
      - proxy
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.wiki.rule=Host(`wiki.jonasandersen.no`)
        - traefik.http.services.wiki.loadbalancer.server.port=8080
        - traefik.http.routers.wiki.entrypoints=http,https,http-external
networks:
  proxy:
    external: true
