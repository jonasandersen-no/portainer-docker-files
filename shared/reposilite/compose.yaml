version: "3.8"
services:
  reposilite:
    image: dzikoysk/reposilite:3.5.28
    ports:
      - ${PORT}:${PORT}
    environment:
      - JAVA_OPTS=-Xmx${MEMORY} ${JAVA_COMPOSE_OPTS}
      - REPOSILITE_OPTS=--port ${PORT} ${REPOSILITE_COMPOSE_OPTS}
    volumes:
      - /mnt/nas/maven/reposilite:/app/data
    restart: unless-stopped
    stdin_open: true
    tty: true
    user: "977:977"
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.reposilite.rule=(Host(`maven.jonasandersen.no`) ||
          Host(`maven.jonasandersen.dev`))
        - traefik.http.routers.reposilite.entrypoints=http, https, http-external
        - traefik.http.services.reposilite.loadbalancer.server.port=${PORT}
    networks:
      - proxy
networks:
  proxy:
    external: true
